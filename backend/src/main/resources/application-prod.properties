# ── Production profile — activated by SPRING_PROFILES_ACTIVE=prod ────────────
# Railway injects PORT automatically; fallback to 8080 (Railway default)
server.port=${PORT:8080}

# ── Database (Railway MySQL plugin env vars) ──────────────────────────────────
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS — same-origin (Angular is served by this same JAR) ──────────────────
app.cors.allowed-origins=${CORS_ORIGINS:*}

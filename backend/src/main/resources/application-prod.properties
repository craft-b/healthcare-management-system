# ── Production profile (Render + TiDB Cloud Serverless) ──────────────────────
# Render injects PORT automatically
server.port=${PORT:8080}

# ── Database ──────────────────────────────────────────────────────────────────
# Set DB_URL, DB_USER, DB_PASSWORD as environment variables in Render dashboard
# TiDB example: jdbc:mysql://<host>:4000/<db>?sslMode=VERIFY_IDENTITY&useSSL=true&serverTimezone=UTC
# MySQL example: jdbc:mysql://<host>:3306/<db>?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.url=${DB_URL}&connectTimeout=10000&socketTimeout=60000
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS — same-origin in prod (Angular served from same JAR) ────────────────
app.cors.allowed-origins=${CORS_ORIGINS:*}

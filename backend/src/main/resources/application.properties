spring.application.name=hms-backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/hmsdb
spring.datasource.username=hms
spring.datasource.password=hmspassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT (override in prod via environment variable)
jwt.secret=hms-super-secret-key-change-this-in-production-must-be-at-least-256-bits
jwt.expiration=86400000

# CORS — allow Angular dev server
spring.web.cors.allowed-origins=http://localhost:4200

services:
  - type: web
    name: medcore-hms
    plan: free
    buildCommand: cd backend && mvn package -DskipTests
    startCommand: java -Dspring.profiles.active=prod -jar backend/target/hms-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/auth/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false       # set manually in Render dashboard
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a random secret

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hms-db
    environment:
      POSTGRES_DB: hmsdb
      POSTGRES_USER: hms
      POSTGRES_PASSWORD: hmspassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms -d hmsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hms-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hmsdb
      SPRING_DATASOURCE_USERNAME: hms
      SPRING_DATASOURCE_PASSWORD: hmspassword
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hms-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
